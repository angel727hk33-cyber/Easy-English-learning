<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動英文溫習小助手 - 句型強化版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e272e; color: #ecf0f1; text-align: center; padding: 10px; margin: 0; overflow-x: hidden; }
        .container { max-width: 650px; margin: 0 auto; background: #2c3e50; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); position: relative; }
        h1 { color: #f1c40f; margin-top: 5px; font-size: 28px;}
        .hidden { display: none !important; }
        
        .tab-container { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .tab-btn { background-color: #7f8c8d; color: white; padding: 10px 5px; border-radius: 10px 10px 0 0; cursor: pointer; font-size: 16px; font-weight: bold; border: none; flex-grow: 1; transition: 0.3s; }
        .tab-btn.active { background-color: #34495e; color: #f1c40f; border-bottom: 3px solid #f1c40f; }
        .tab-quiz.active { background-color: #4a235a; color: #ff9ff3; border-bottom: 3px solid #ff9ff3; }

        .game-hud { display: flex; justify-content: space-between; background-color: #34495e; padding: 10px 20px; border-radius: 0 0 10px 10px; margin-bottom: 15px; font-size: 20px; font-weight: bold; border: 2px solid #f39c12; border-top: none; color: #f1c40f; }
        .player-hp { color: #e74c3c; font-size: 22px; letter-spacing: 2px;}

        .battle-arena { display: flex; justify-content: space-around; align-items: flex-end; background: linear-gradient(to bottom, #87CEEB 0%, #a2d149 100%); height: 180px; border-radius: 15px; margin-bottom: 20px; padding: 10px; border: 3px solid #bdc3c7; position: relative; }
        .arena-quiz { background: linear-gradient(to bottom, #2c3e50 0%, #8e44ad 100%); border-color: #ff9ff3;}
        
        .entity-area { display: flex; flex-direction: column; align-items: center; position: relative; }
        .sprite { font-size: 80px; transition: transform 0.1s; z-index: 2;}
        .monster-sprite { font-size: 90px; }
        .boss-sprite { font-size: 110px; filter: drop-shadow(0 0 10px #ff9ff3); }

        .hp-label { font-size: 12px; font-weight: bold; color: #2c3e50; margin-bottom: 2px; text-shadow: 1px 1px white;}
        .hp-bar-container { width: 100px; height: 12px; background-color: #c0392b; border-radius: 6px; margin-bottom: 5px; border: 2px solid #fff; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.3s ease; }
        .monster-hp { background-color: #2ecc71; }

        @keyframes attackShake { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(30px) scale(1.1); } }
        @keyframes hitShake { 0%, 100% { transform: translateX(0) rotate(0deg); filter: brightness(1); } 25%, 75% { transform: translateX(-15px) rotate(-10deg); filter: brightness(2) drop-shadow(0 0 10px red); } }
        @keyframes playerHurt { 0%, 100% { filter: none; transform: translateX(0); } 50% { filter: drop-shadow(0 0 15px red); transform: translateX(-10px); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }

        .animate-attack { animation: attackShake 0.3s; }
        .animate-hit { animation: hitShake 0.4s; }
        .animate-hurt { animation: playerHurt 0.4s; }
        .floating-text { position: absolute; font-size: 28px; font-weight: bold; z-index: 10; pointer-events: none; animation: floatUp 1s ease-out forwards; }
        .text-gain { color: #f1c40f; text-shadow: 2px 2px #d35400; }
        .text-loss { color: #e74c3c; text-shadow: 2px 2px #c0392b; }

        .stage-badge { display: inline-block; padding: 8px 15px; border-radius: 20px; font-weight: bold; color: white; margin-bottom: 10px; font-size: 16px; }
        .stage-0 { background-color: #3498db; } .stage-1 { background-color: #f39c12; } .stage-2 { background-color: #9b59b6; } .stage-3 { background-color: #e74c3c; }
        .stage-quiz { background-color: #ff9ff3; color: #2c3e50; border: 2px solid white;}

        #hintBox { font-size: 48px; font-weight: bold; letter-spacing: 5px; background-color: #ecf0f1; color: #2c3e50; padding: 15px; border-radius: 15px; margin: 10px 0; min-height: 60px; border: 3px dashed #3498db; word-wrap: break-word; }
        .sentence-mode #hintBox { font-size: 32px; letter-spacing: 2px; }
        .vowel { color: #e74c3c; } .consonant { color: #2980b9; } 
        .blank-space { color: #e67e22; letter-spacing: 2px; font-weight: bold;} 

        textarea { width: 85%; height: 70px; padding: 10px; font-size: 16px; border-radius: 10px; margin-bottom: 15px; }
        .input-group { background: #34495e; padding: 15px; border-radius: 15px; margin-bottom: 15px;}
        .input-group h3 { margin: 0 0 10px 0; color: #34db98; text-align: left; padding-left: 20px;}
        
        button { background-color: #2ecc71; color: white; border: none; padding: 12px 25px; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #27ae60; }
        button:active { transform: translateY(4px); box-shadow: 0 0 0; }
        .btn-voice { background-color: #f39c12; border-radius: 50px; box-shadow: 0 4px 0 #d68910;}
        .btn-back { background-color: #95a5a6; font-size: 14px; padding: 8px 15px; box-shadow: 0 4px 0 #7f8c8d; margin-bottom:10px;}
        
        input[type="text"] { width: 85%; padding: 15px; font-size: 24px; text-align: center; border-radius: 10px; border: 3px solid #f1c40f; margin: 10px 0; outline: none; font-weight: bold; }
        input[type="text"]:focus { border-color: #e74c3c; }
        #feedbackMessage { font-size: 20px; font-weight: bold; margin: 10px 0; min-height: 30px; }
        .correct { color: #2ecc71; } .wrong { color: #e74c3c; }
        #progressText { color: #bdc3c7; font-size: 14px; font-weight: bold; margin-bottom: 5px;}
        #repeatDots { font-size: 20px; margin-bottom: 10px; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚔️ 英文單字捍衛戰</h1>

    <div id="parentMode">
        <p style="color: #ecf0f1;">準備戰鬥裝備：</p>
        <div class="input-group">
            <h3>📝 詞語區 (以逗號或換行隔開)</h3>
            <textarea id="wordInput" placeholder="apple, beautiful, elephant"></textarea>
        </div>
        <div class="input-group">
            <h3 style="color: #3498db;">💬 句子區 (每行一句)</h3>
            <textarea id="sentenceInput" placeholder="I have a pen.&#10;She is eating an apple."></textarea>
        </div>
        <button onclick="saveTasks()" style="font-size: 22px; padding: 15px 40px;">⚔️ 開始挑戰！</button>
    </div>

    <div id="kidMode" class="hidden">
        <div class="tab-container">
            <button id="tabWord" class="tab-btn active" onclick="switchTab('word')">🗡️ 詞語挑戰</button>
            <button id="tabSentence" class="tab-btn" onclick="switchTab('sentence')">🛡️ 句子挑戰</button>
            <button id="tabQuiz" class="tab-btn tab-quiz" onclick="switchTab('quiz')">👑 終極測驗</button>
        </div>

        <div class="game-hud">
            <span class="player-hp" id="playerHpDisplay">❤️❤️❤️</span>
            <span>🪙 <span id="coinScore">0</span></span>
            <span>🏆 LV.<span id="playerLevel">1</span></span>
        </div>

        <div class="battle-arena" id="arena">
            <div class="entity-area">
                <div class="hp-label" style="color:white">玩家</div>
                <div id="player" class="sprite">🦸‍♂️</div>
            </div>
            <div class="entity-area">
                <div class="hp-label" style="color:white">怪獸血量</div>
                <div class="hp-bar-container">
                    <div id="monsterHpFill" class="hp-fill monster-hp"></div>
                </div>
                <div id="monster" class="sprite monster-sprite">👾</div>
            </div>
        </div>

        <button class="btn-back" onclick="switchMode('parent')">🏳️ 撤退修改</button>
        <button class="btn-voice" onclick="speakWord()">🔊 聽音效</button>

        <div id="progressText">任務進度：1 / 5</div>
        <div id="stageBadge" class="stage-badge stage-0">第一關</div>
        <div id="repeatDots"></div>

        <div id="taskArea">
            <div id="hintBox">APPLE</div>
            <input type="text" id="spellInput" placeholder="輸入攻擊指令..." autocomplete="off">
            <br>
            <button id="submitBtn" onclick="checkAnswer()">🗡️ 攻擊！</button>
            <div id="feedbackMessage"></div>
        </div>
    </div>
</div>

<script>
    let tasks = { word: [], sentence: [], quiz: [] };
    let currentIndex = { word: 0, sentence: 0, quiz: 0 };
    let learningStage = { word: 0, sentence: 0 }; 
    let typingCount = { word: 0, sentence: 0 };
    let activeTab = 'word';
    let isAnimating = false; 
    
    let coins = 0;
    let playerLevel = 1;
    let playerCurrentHp = 3;
    let monsterHp = 100;
    const monsterList = ['👾', '🐉', '🦖', '👹', '👽', '👻', '🦇'];
    const bossList = ['👿', '💀', '👺', '🌋'];
    let currentMonsterIndex = 0;

    // 句子的四階梯名字更新
    const stageNames = {
        word: ["第一關：睇清楚，跟住打 👀", "第二關：填空格，估下字 🕳️", "第三關：拆字謎，拼拼圖 🧩", "第四關：靠記憶，自己默 🧠"],
        sentence: ["第一關：睇原句，照住打 👀", "第二關：單字亂了，排番好 🧩", "第三關：字頭提示，記憶挑戰 🅰️", "第四關：聽讀音，全句默寫 🧠"]
    };

    window.onload = function() {
        if (localStorage.getItem('savedWords')) document.getElementById('wordInput').value = localStorage.getItem('savedWords');
        if (localStorage.getItem('savedSentences')) document.getElementById('sentenceInput').value = localStorage.getItem('savedSentences');
    };

    // 詞語填空產生器
    function generateFillBlank(word) {
        let arr = word.split('');
        let letters = [];
        for(let i=0; i<arr.length; i++) { if(/[a-zA-Z]/.test(arr[i])) letters.push(i); }
        if(letters.length <= 1) return word.replace(/[a-zA-Z]/, '_');
        let numToHide = 1;
        if(letters.length >= 5) numToHide = 2;
        if(letters.length >= 7) numToHide = 3;
        letters.sort(() => 0.5 - Math.random());
        for(let i=0; i<numToHide; i++) { arr[letters[i]] = '_'; }
        return arr.join(' ');
    }

    // ⭐ 新增：句子「首字母提示」產生器
    function generateFirstLetterHint(sentence) {
        let words = sentence.split(' ');
        let hintedWords = words.map(word => {
            let res = "";
            let firstLetterFound = false;
            for(let i=0; i<word.length; i++) {
                let char = word[i];
                if(/[a-zA-Z]/.test(char)) {
                    if(!firstLetterFound) {
                        res += char; // 保留第一個字母
                        firstLetterFound = true;
                    } else {
                        res += '<span class="blank-space">_</span>'; // 其他字母變底線
                    }
                } else {
                    res += char; // 保留標點符號
                }
            }
            return res;
        });
        return hintedWords.join(' ');
    }

    function scrambleText(text, type) {
        if (type === 'word') {
            let shuffled = text.split('').sort(()=> 0.5-Math.random()).join(' - ');
            while(shuffled.replace(/ - /g, '') === text && text.length > 1) shuffled = text.split('').sort(()=> 0.5-Math.random()).join(' - ');
            return shuffled;
        } else {
            let words = text.split(' ');
            let shuffled = [...words].sort(()=> 0.5-Math.random()).join(' / ');
            while(shuffled.replace(/ \/ /g, ' ') === text && words.length > 1) shuffled = [...words].sort(()=> 0.5-Math.random()).join(' / ');
            return shuffled;
        }
    }

    function saveTasks() {
        const rawWords = document.getElementById('wordInput').value;
        const rawSentences = document.getElementById('sentenceInput').value;
        localStorage.setItem('savedWords', rawWords);
        localStorage.setItem('savedSentences', rawSentences);
        
        const wArray = rawWords.split(/[\n,]+/).map(w => w.trim()).filter(w => w.length > 0);
        tasks.word = wArray.map(w => ({ text: w, fillHint: generateFillBlank(w) }));
        tasks.sentence = rawSentences.split('\n').map(s => s.trim()).filter(s => s.length > 0).map(s => ({ text: s }));

        if (tasks.word.length === 0 && tasks.sentence.length === 0) { alert("請至少輸入一個詞語或句子！"); return; }

        tasks.quiz = [];
        let shuffledWords = [...wArray].sort(() => 0.5 - Math.random());
        const quizModes = ['fill', 'scramble', 'dictate'];
        shuffledWords.forEach(w => {
            let rMode = quizModes[Math.floor(Math.random() * quizModes.length)];
            let hint = rMode === 'fill' ? generateFillBlank(w) : (rMode === 'scramble' ? scrambleText(w, 'word') : '❓❓❓');
            tasks.quiz.push({ text: w, mode: rMode, hint: hint });
        });

        currentIndex = { word: 0, sentence: 0, quiz: 0 };
        learningStage = { word: 0, sentence: 0 };
        typingCount = { word: 0, sentence: 0 };
        playerCurrentHp = 3; monsterHp = 100; 
        
        activeTab = tasks.word.length > 0 ? 'word' : 'sentence';
        switchTab(activeTab);
        switchMode('kid');
    }

    function switchTab(tabType) {
        if (tasks[tabType].length === 0) { alert(`沒有設定此區的題目喔！`); return; }
        activeTab = tabType;
        document.getElementById('tabWord').classList.toggle('active', tabType === 'word');
        document.getElementById('tabSentence').classList.toggle('active', tabType === 'sentence');
        document.getElementById('tabQuiz').classList.toggle('active', tabType === 'quiz');
        
        const arena = document.getElementById('arena'); const monster = document.getElementById('monster');
        if(tabType === 'quiz') {
            arena.classList.add('arena-quiz');
            monster.innerText = bossList[Math.floor(Math.random() * bossList.length)];
            monster.classList.add('boss-sprite');
        } else {
            arena.classList.remove('arena-quiz');
            monster.innerText = monsterList[currentMonsterIndex];
            monster.classList.remove('boss-sprite');
        }
        document.getElementById('feedbackMessage').innerHTML = ""; updateUI();
    }

    function showFloatingText(text, type, elementId) {
        const target = document.getElementById(elementId);
        const floatEl = document.createElement('div');
        floatEl.className = `floating-text ${type === 'gain' ? 'text-gain' : 'text-loss'}`; floatEl.innerText = text;
        const rect = target.getBoundingClientRect(); const arenaRect = document.getElementById('arena').getBoundingClientRect();
        floatEl.style.left = (rect.left - arenaRect.left + rect.width/2 - 20) + 'px'; floatEl.style.top = (rect.top - arenaRect.top - 20) + 'px';
        document.getElementById('arena').appendChild(floatEl); setTimeout(() => floatEl.remove(), 1000);
    }

    function triggerFireworks() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 9999 }); }

    function updateHpUI() {
        document.getElementById('playerHpDisplay').innerText = '❤️'.repeat(playerCurrentHp) + '🖤'.repeat(3 - playerCurrentHp);
        document.getElementById('monsterHpFill').style.width = Math.max(0, monsterHp) + "%";
        document.getElementById('monsterHpFill').style.backgroundColor = monsterHp < 40 ? "#e74c3c" : "#2ecc71";
    }

    function playerTakeDamage() {
        if (playerCurrentHp > 0) {
            playerCurrentHp--; updateHpUI(); showFloatingText("-1 ❤️", 'loss', 'player');
            const playerEl = document.getElementById('player'); playerEl.classList.remove('animate-hurt'); void playerEl.offsetWidth; playerEl.classList.add('animate-hurt');
            if (playerCurrentHp === 0) { setTimeout(() => { alert("力氣用盡了！滿血復活繼續挑戰！"); playerCurrentHp = 3; updateHpUI(); }, 500); }
        }
    }

    function attackMonster() {
        const player = document.getElementById('player'); const monster = document.getElementById('monster');
        player.classList.remove('animate-attack'); void player.offsetWidth; player.classList.add('animate-attack');
        
        setTimeout(() => {
            monster.classList.remove('animate-hit'); void monster.offsetWidth; monster.classList.add('animate-hit');
            let dmg = activeTab === 'quiz' ? 50 : 34; let coinGain = activeTab === 'quiz' ? 20 : 10;
            showFloatingText(`+${coinGain} 🪙`, 'gain', 'monster');
            monsterHp -= dmg; coins += coinGain; document.getElementById('coinScore').innerText = coins;
            if (coins > 0 && coins % 100 === 0) triggerFireworks();
            
            if (monsterHp <= 0) {
                monsterHp = 100; playerLevel++; document.getElementById('playerLevel').innerText = playerLevel;
                if(activeTab === 'quiz') monster.innerText = bossList[Math.floor(Math.random() * bossList.length)];
                else { currentMonsterIndex = (currentMonsterIndex + 1) % monsterList.length; monster.innerText = monsterList[currentMonsterIndex]; }
                document.getElementById('feedbackMessage').innerHTML += " 💥怪獸被打敗了！升級！"; triggerFireworks(); 
            }
            updateHpUI(); isAnimating = false;
        }, 150);
    }

    function checkAnswer() {
        if (isAnimating) return; 
        const inputField = document.getElementById('spellInput');
        const userInput = inputField.value.replace(/\s+/g, ' ').trim().toLowerCase();
        const currentTaskText = tasks[activeTab][currentIndex[activeTab]].text;
        
        const cleanCorrectAnswer = currentTaskText.replace(/[.!?]$/, '').toLowerCase();
        const cleanUserInput = userInput.replace(/[.!?]$/, '');
        const feedbackMessage = document.getElementById('feedbackMessage');

        if (cleanUserInput === cleanCorrectAnswer) {
            isAnimating = true; inputField.value = ""; attackMonster();

            if(activeTab === 'quiz') {
                feedbackMessage.innerHTML = "🎯 完美擊中大魔王！"; feedbackMessage.className = "correct";
                setTimeout(() => { currentIndex.quiz++; updateUI(); }, 1000);
            } else {
                let currentStage = learningStage[activeTab];
                let targetCount = 1;
                
                if (activeTab === 'word') {
                    if (currentStage === 0) targetCount = 3; 
                    if (currentStage === 1) targetCount = 2; 
                }

                typingCount[activeTab]++;

                if (typingCount[activeTab] < targetCount) {
                    feedbackMessage.innerHTML = `✨ 很好！還有 ${targetCount - typingCount[activeTab]} 次！`;
                    feedbackMessage.className = "correct"; inputField.focus(); 
                    if (activeTab === 'word' && currentStage === 1) {
                        tasks.word[currentIndex.word].fillHint = generateFillBlank(currentTaskText);
                        document.getElementById('hintBox').innerHTML = tasks.word[currentIndex.word].fillHint.replace(/_/g, '<span class="blank-space">_</span>');
                    }
                    updateRepeatDots(); return; 
                } else { 
                    typingCount[activeTab] = 0; learningStage[activeTab]++; 
                }

                feedbackMessage.innerHTML = "🎯 完美命中！"; feedbackMessage.className = "correct";
                setTimeout(() => {
                    let maxStage = 3; // 詞語和句子現在都是 4 階 (maxStage = 3)
                    if (learningStage[activeTab] > maxStage) { currentIndex[activeTab]++; learningStage[activeTab] = 0; }
                    updateUI();
                }, 1000);
            }
        } else {
            feedbackMessage.innerHTML = "💦 哎呀，攻擊落空！(扣除1顆愛心)";
            feedbackMessage.className = "wrong"; playerTakeDamage(); inputField.focus();
        }
    }

    function speakWord() {
        if (tasks[activeTab].length === 0) return;
        const utterance = new SpeechSynthesisUtterance(tasks[activeTab][currentIndex[activeTab]].text);
        utterance.lang = 'en-GB'; utterance.rate = activeTab === 'sentence' ? 0.7 : 0.8;
        window.speechSynthesis.speak(utterance);
    }

    function formatPhonicsWord(word) {
        const vowels = ['a', 'e', 'i', 'o', 'u']; let formatted = '';
        for (let char of word) {
            if (vowels.includes(char.toLowerCase())) formatted += `<span class="vowel">${char}</span>`;
            else if (/[a-zA-Z]/.test(char)) formatted += `<span class="consonant">${char}</span>`;
            else formatted += char; 
        }
        return formatted;
    }

    function updateRepeatDots() {
        const dotsContainer = document.getElementById('repeatDots');
        if (activeTab === 'word' && (learningStage.word === 0 || learningStage.word === 1)) {
            dotsContainer.style.display = "block"; let dots = "";
            let maxDots = learningStage.word === 0 ? 3 : 2;
            for(let i=0; i<maxDots; i++) dots += (i < typingCount.word) ? "🟢" : "⚪";
            dotsContainer.innerText = dots;
        } else { dotsContainer.style.display = "none"; }
    }

    function updateUI() {
        const currentList = tasks[activeTab];
        const cIndex = currentIndex[activeTab];

        if (cIndex >= currentList.length) {
            document.getElementById('progressText').innerText = "✅ 本區所有敵人已被消滅！";
            document.getElementById('stageBadge').className = "hidden";
            document.getElementById('hintBox').innerHTML = `🏆 勝利！請點擊上方切換其他挑戰！`;
            document.getElementById('spellInput').classList.add('hidden');
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('repeatDots').classList.add('hidden');
            return;
        }

        const taskArea = document.getElementById('taskArea');
        activeTab === 'sentence' ? taskArea.classList.add('sentence-mode') : taskArea.classList.remove('sentence-mode');
        
        document.getElementById('progressText').innerText = `任務進度：${cIndex + 1} / ${currentList.length}`;
        const badge = document.getElementById('stageBadge');
        const hintBox = document.getElementById('hintBox');

        if(activeTab === 'quiz') {
            const quizTask = currentList[cIndex];
            let modeName = quizTask.mode === 'fill' ? '填空格' : (quizTask.mode === 'scramble' ? '重組字' : '全默寫');
            badge.innerText = `👑 魔王題：${modeName}`;
            badge.className = `stage-badge stage-quiz`;
            hintBox.innerHTML = quizTask.hint.replace(/_/g, '<span class="blank-space">_</span>'); 
        } else {
            const cStage = learningStage[activeTab];
            const currentText = currentList[cIndex].text;
            badge.innerText = stageNames[activeTab][cStage];
            badge.className = `stage-badge stage-${cStage}`;
            
            if (activeTab === 'word') {
                if (cStage === 0) hintBox.innerHTML = formatPhonicsWord(currentText);
                else if (cStage === 1) hintBox.innerHTML = currentList[cIndex].fillHint.replace(/_/g, '<span class="blank-space">_</span>');
                else if (cStage === 2) hintBox.innerText = scrambleText(currentText, 'word');
                else if (cStage === 3) hintBox.innerText = "❓❓❓"; 
            } else {
                // ⭐ 句子區 UI 更新
                if (cStage === 0) hintBox.innerText = currentText; 
                else if (cStage === 1) hintBox.innerText = scrambleText(currentText, 'sentence');
                else if (cStage === 2) hintBox.innerHTML = generateFirstLetterHint(currentText); // 第三關：首字母提示
                else if (cStage === 3) hintBox.innerText = "❓❓❓"; 
            }
        }

        updateRepeatDots(); 
        const inputField = document.getElementById('spellInput');
        inputField.value = ""; inputField.classList.remove('hidden'); inputField.focus();
        document.getElementById('feedbackMessage').innerHTML = ""; document.getElementById('submitBtn').classList.remove('hidden');
        speakWord(); 
    }

    document.getElementById("spellInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") { event.preventDefault(); checkAnswer(); }
    });

    function switchMode(mode) {
        if (mode === 'kid') {
            document.getElementById('parentMode').classList.add('hidden'); document.getElementById('kidMode').classList.remove('hidden');
        } else {
            document.getElementById('parentMode').classList.remove('hidden'); document.getElementById('kidMode').classList.add('hidden');
            window.speechSynthesis.cancel();
        }
    }
</script>

</body>
</html>
