<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動英文溫習小助手 - 終極聽默版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #1a1a1a; color: #ffffff; text-align: center; padding: 10px; margin: 0; overflow-x: hidden; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        .container { max-width: 650px; margin: 0 auto; background: #c6c6c6; padding: 20px; border: 6px solid #000; box-shadow: inset -6px -6px 0px 0px #555, inset 6px 6px 0px 0px #fff; position: relative; }
        h1 { color: #55FF55; margin-top: 5px; font-size: 32px; text-shadow: 3px 3px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;}
        .hidden { display: none !important; }
        
        .tab-container { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .tab-btn { background-color: #8b8b8b; color: white; padding: 10px 5px; cursor: pointer; font-size: 16px; font-weight: bold; border: 4px solid #000; border-bottom: none; box-shadow: inset 4px 4px 0px #fff; flex-grow: 1; text-shadow: 2px 2px #000;}
        .tab-btn.active { background-color: #55FF55; color: #000; box-shadow: inset 4px 4px 0px #AAFFAA; text-shadow: none;}
        .tab-quiz.active { background-color: #AA00AA; color: #FFF; box-shadow: inset 4px 4px 0px #FF55FF; }

        .game-hud { display: flex; justify-content: space-between; background-color: #333; padding: 10px 20px; margin-bottom: 15px; font-size: 20px; font-weight: bold; border: 4px solid #000; color: #FFF; box-shadow: inset -4px -4px 0px #111, inset 4px 4px 0px #555;}
        .player-hp { color: #FF5555; font-size: 22px; letter-spacing: 2px;}

        .battle-arena { display: flex; justify-content: space-between; align-items: flex-end; background-color: #7EC0EE; height: 200px; margin-bottom: 20px; padding: 10px 20px; border: 6px solid #000; position: relative; overflow: hidden;}
        .battle-arena::before { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 35%; background: #8B4513; border-top: 12px solid #3CB371; z-index: 1;}
        .mc-sun { position: absolute; top: 15px; left: 20px; width: 45px; height: 45px; background-color: #FFDF00; border: 4px solid #000; box-shadow: inset 4px 4px 0px #FFF9AA; z-index: 2;}
        .mc-cloud { position: absolute; width: 60px; height: 20px; background-color: #FFF; box-shadow: 20px -15px 0 #FFF, 40px 0 0 #FFF, 10px 15px 0 #FFF, 30px 10px 0 #FFF; opacity: 0.9; z-index: 2;}
        .arena-quiz { background-color: #2C002C; border-color: #FF55FF;}
        .arena-quiz::before { background: #1a001a; border-top: 12px solid #550055; }
        .arena-quiz .mc-sun { background-color: #AA00AA; box-shadow: inset 4px 4px 0px #FF55FF; }

        .entity-area { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 5;}
        .sprite { font-size: 80px; transition: transform 0.1s; filter: drop-shadow(2px 2px 0 #000); }
        .monster-sprite { font-size: 80px; }
        .boss-sprite { font-size: 100px; filter: drop-shadow(0 0 10px #FF55FF) drop-shadow(2px 2px 0 #000); }

        #houseContainer { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap-reverse; align-content: flex-start; justify-content: center; width: 200px; height: 120px; z-index: 3;}
        .mc-block { font-size: 40px; width: 40px; height: 40px; line-height: 40px; margin-top: -5px; animation: dropIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(2px 2px 0 #000);}

        .hp-label { font-size: 16px; font-weight: bold; color: #FFF; margin-bottom: 2px; text-shadow: 2px 2px #000;}
        .hp-bar-container { width: 100px; height: 16px; background-color: #333; margin-bottom: 5px; border: 4px solid #000; overflow: hidden; }
        .hp-fill { height: 100%; width: 0%; transition: width 0.3s ease; background-color: #8B4513; border-top: 4px solid #55FF55; }

        @keyframes dropIn { 0% { transform: translateY(-50px) scale(1.5); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes hitShake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-15px); } }
        @keyframes playerHurt { 0%, 100% { filter: drop-shadow(2px 2px 0 #000); transform: translateX(0); } 50% { filter: drop-shadow(0 0 15px red) sepia(1) hue-rotate(-50deg); transform: translateX(-10px); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }
        @keyframes monsterThrow { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.1); } }
        @keyframes upgradeGlow { 0%, 100% { filter: drop-shadow(2px 2px 0 #000); } 50% { filter: drop-shadow(0 0 20px #FFD700) drop-shadow(2px 2px 0 #000); transform: scale(1.2); } }

        .animate-hit { animation: hitShake 0.4s; }
        .animate-hurt { animation: playerHurt 0.4s; }
        .animate-throw { animation: monsterThrow 0.3s; }
        .animate-upgrade { animation: upgradeGlow 1s; }
        .floating-text { position: absolute; font-size: 28px; font-weight: bold; z-index: 10; pointer-events: none; animation: floatUp 1s ease-out forwards; text-shadow: 3px 3px #000; }
        .text-gain { color: #55FF55; } .text-loss { color: #FF5555; }

        .stage-badge { display: inline-block; padding: 8px 15px; font-weight: bold; color: white; margin-bottom: 10px; font-size: 16px; border: 4px solid #000; box-shadow: inset 2px 2px 0 #fff; text-shadow: 2px 2px #000;}
        .stage-0 { background-color: #3333AA; } .stage-1 { background-color: #AA5500; } .stage-2 { background-color: #AA00AA; } .stage-3 { background-color: #AA0000; }
        .stage-quiz { background-color: #FF55FF; color: #000; text-shadow: none;}

        #hintBox { font-size: 40px; font-weight: bold; letter-spacing: 5px; background-color: #000; color: #FFF; padding: 15px; margin: 5px 0; border: 6px dashed #555; word-wrap: break-word; min-height: 50px;}
        .sentence-mode #hintBox { font-size: 24px; letter-spacing: 2px; }
        .vowel { color: #FF5555; } .consonant { color: #55FFFF; } 
        .blank-space { color: #FFFF55; letter-spacing: 2px; font-weight: bold;} 
        .syllable-dot { color: #aaaaaa; font-size: 1em; margin: 0 2px; font-weight: normal; text-shadow: none;} 
        
        #meaningBox { font-size: 22px; color: #FFD700; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px #000; min-height: 25px;}

        textarea { width: 85%; height: 70px; padding: 10px; font-family: 'Courier New', Courier, monospace; font-size: 16px; border: 4px solid #000; margin-bottom: 15px; background: #E0E0E0; box-shadow: inset 4px 4px 0 #aaa;}
        .input-group { background: #555; padding: 15px; border: 4px solid #000; margin-bottom: 15px; box-shadow: inset 4px 4px 0 #777;}
        .input-group h3 { margin: 0 0 10px 0; color: #55FF55; text-align: left; padding-left: 20px; text-shadow: 2px 2px #000;}
        .input-hint { font-size: 12px; color: #FFF; text-align: left; padding-left: 20px; margin-bottom: 5px; line-height: 1.5;}
        
        button { background-color: #8b8b8b; color: white; border: 4px solid #000; padding: 12px 25px; font-size: 18px; cursor: pointer; font-weight: bold; font-family: 'Courier New', Courier, monospace; box-shadow: inset 4px 4px 0px #fff, inset -4px -4px 0px #555; text-shadow: 2px 2px #000;}
        button:active { box-shadow: inset 4px 4px 0px #555, inset -4px -4px 0px #fff; }
        
        /* 語音按鈕組 */
        .voice-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;}
        .btn-voice { background-color: #FFAA00; box-shadow: inset 4px 4px 0px #FFCC55, inset -4px -4px 0px #CC8800;}
        .btn-slow { background-color: #27ae60; box-shadow: inset 4px 4px 0px #2ecc71, inset -4px -4px 0px #1e8449;}
        
        .btn-back { background-color: #555; font-size: 14px; padding: 8px 15px; margin-bottom:10px; box-shadow: inset 2px 2px 0px #777, inset -2px -2px 0px #333;}
        .btn-rewind { background-color: #FF5555; box-shadow: inset 4px 4px 0px #FF9999, inset -4px -4px 0px #AA0000; margin-left: 10px;}
        .btn-scan { background-color: #3498db; width: 85%; margin-bottom: 10px; box-shadow: inset 4px 4px 0px #85c1e9, inset -4px -4px 0px #21618c;}
        #ocrStatus { font-size: 14px; color: #F1C40F; font-weight: bold; margin-bottom: 10px;}

        input[type="text"] { width: 85%; padding: 15px; font-size: 24px; text-align: center; border: 6px solid #000; margin: 10px 0; outline: none; font-weight: bold; font-family: 'Courier New', Courier, monospace; background: #FFF; box-shadow: inset 4px 4px 0px #CCC;}
        input[type="text"]:focus { border-color: #55FF55; }
        #feedbackMessage { font-size: 20px; font-weight: bold; margin: 10px 0; min-height: 30px; text-shadow: 2px 2px #000;}
        .correct { color: #55FF55; } .wrong { color: #FF5555; }
        #progressText { color: #333; font-size: 14px; font-weight: bold; margin-bottom: 5px;}
        #repeatDots { font-size: 20px; margin-bottom: 5px; letter-spacing: 5px; text-shadow: 2px 2px #000;}
    </style>
</head>
<body>

<div class="container">
    <h1>⚔️ Shino 方塊守護戰</h1>

    <div id="parentMode">
        <p style="color: #333; font-weight: bold;">準備建築材料與設計圖：</p>
        <div class="input-group">
            <h3>📝 詞語區</h3>
            <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="processImage(event)">
            <button class="btn-scan" onclick="document.getElementById('imageUpload').click()">📸 拍攝/上傳工作紙提取生字</button>
            <div id="ocrStatus" class="hidden">🔄 正在使用魔法辨識文字，請稍候...</div>

            <p class="input-hint">格式：<code>英文 = 中文解釋</code> (可用 <code>-</code> 分隔音節)<br>例如：<code>ap-ple = 蘋果</code></p>
            <textarea id="wordInput" placeholder="ap-ple = 蘋果&#10;el-e-phant = 大象"></textarea>
        </div>
        <div class="input-group">
            <h3 style="color: #55FFFF;">💬 句子區</h3>
            <p class="input-hint">格式：<code>句子 = 中文翻譯</code> (同樣支援 <code>-</code> 分隔音節)<br>例如：<code>I have a beau-ti-ful pen. = 我有一枝筆。</code></p>
            <textarea id="sentenceInput" placeholder="I have a beau-ti-ful pen. = 我有一枝美麗的筆。&#10;She is eat-ing. = 她在吃東西。"></textarea>
        </div>
        <button onclick="saveTasks()" style="font-size: 22px; padding: 15px 40px; background-color: #55FF55; color: #000; text-shadow: none;">⚔️ 裝備完畢，出發！</button>
    </div>

    <div id="kidMode" class="hidden">
        <div class="tab-container">
            <button id="tabWord" class="tab-btn active" onclick="switchTab('word')">🗡️ 詞語挑戰</button>
            <button id="tabSentence" class="tab-btn" onclick="switchTab('sentence')">🛡️ 句子挑戰</button>
            <button id="tabQuiz" class="tab-btn tab-quiz" onclick="switchTab('quiz')">👑 終極突襲</button>
        </div>

        <div class="game-hud">
            <span class="player-hp" id="playerHpDisplay">❤️❤️❤️</span>
            <span>💎 <span id="coinScore">0</span></span>
            <span>🏆 LV.<span id="playerLevel">1</span></span>
        </div>

        <div class="battle-arena" id="arena">
            <div class="mc-sun"></div>
            <div class="mc-cloud" style="top: 20px; left: 30%;"></div>
            <div class="mc-cloud" style="top: 45px; right: 20%;"></div>

            <div class="entity-area">
                <div class="hp-label">Shino</div>
                <div id="player" class="sprite">👧</div>
            </div>
            
            <div id="houseContainer"></div>

            <div class="entity-area">
                <div class="hp-label">建築進度</div>
                <div class="hp-bar-container">
                    <div id="monsterHpFill" class="hp-fill"></div>
                </div>
                <div id="monster" class="sprite monster-sprite">🐷</div>
            </div>
        </div>

        <button class="btn-back" onclick="switchMode('parent')">🏳️ 撤退修改</button>
        
        <!-- 語音控制區 -->
        <div class="voice-controls">
            <button class="btn-voice" onclick="speakWord('normal')">🔊 聽音效</button>
            <button class="btn-slow" onclick="speakWord('slow')">🐢 慢慢聽</button>
            <button id="rewindBtn" class="btn-rewind hidden" onclick="rewindWord()">🔄 唔太熟？重練此題</button>
        </div>

        <div id="progressText">任務進度：1 / 5</div>
        <div id="stageBadge" class="stage-badge stage-0">第一關</div>
        <div id="repeatDots"></div>

        <div id="taskArea">
            <div id="hintBox">APPLE</div>
            <div id="meaningBox">蘋果</div>
            <input type="text" id="spellInput" placeholder="輸入指令放置方塊..." autocomplete="off">
            <br>
            <button id="submitBtn" onclick="checkAnswer()">🧱 放置方塊！</button>
            <div id="feedbackMessage"></div>
        </div>
    </div>
</div>

<script>
    async function processImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const statusText = document.getElementById('ocrStatus');
        const wordInput = document.getElementById('wordInput');
        statusText.classList.remove('hidden');
        statusText.innerText = "🔄 正在使用魔法辨識圖片中的文字... (可能需要十幾秒)";

        try {
            const result = await Tesseract.recognize(file, 'eng', {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        statusText.innerText = `🔄 正在辨識... ${Math.round(m.progress * 100)}%`;
                    }
                }
            });

            const rawText = result.data.text;
            const words = rawText.match(/\b[A-Za-z]{2,}\b/g);
            
            if (words && words.length > 0) {
                const uniqueWords = [...new Set(words.map(w => w.toLowerCase()))];
                const formattedWords = uniqueWords.map(w => `${w} = `).join('\n');
                
                if(wordInput.value.trim() !== '') {
                    wordInput.value += '\n' + formattedWords;
                } else {
                    wordInput.value = formattedWords;
                }
                statusText.innerText = "✅ 掃描完成！請手動補上中文解釋或音節 (-)。";
            } else {
                statusText.innerText = "❌ 找不到清晰的英文字，請嘗試近一點拍攝！";
            }
        } catch (error) {
            console.error(error);
            statusText.innerText = "❌ 辨識失敗，請稍後再試。";
        }
    }

    let tasks = { word: [], sentence: [], quiz: [] };
    let currentIndex = { word: 0, sentence: 0, quiz: 0 };
    let learningStage = { word: 0, sentence: 0 }; 
    let typingCount = { word: 0, sentence: 0 };
    let activeTab = 'word';
    let isAnimating = false; 
    
    let coins = 0;
    let playerLevel = 1;
    let playerCurrentHp = 3;
    let buildProgress = 0; 
    let equipmentLevel = 0; 
    const monsterList = ['🐷', '🧟‍♂️', '🕷️', '💀', '🏹']; 
    const bossList = ['🐉', '🌋', '👾']; 
    let currentMonsterIndex = 0;

    const stageNames = {
        word: ["第一階段：睇清楚，跟住打 👀", "第二階段：填空格，估下字 🕳️", "第三階段：拆字謎，拼拼圖 🧩", "第四階段：靠記憶，自己默 🧠"],
        sentence: ["第一階段：睇原句，照住打 👀", "第二階段：單字亂了，排番好 🧩", "第三階段：字頭提示，記憶挑戰 🅰️", "第四階段：聽讀音，全句默寫 🧠"]
    };

    window.onload = function() {
        if (localStorage.getItem('savedWords')) document.getElementById('wordInput').value = localStorage.getItem('savedWords');
        if (localStorage.getItem('savedSentences')) document.getElementById('sentenceInput').value = localStorage.getItem('savedSentences');
    };

    // 解析文字並加入 type 屬性
    function parseInput(rawText, type) {
        let delimiter = type === 'word' ? /[\n,]+/ : /\n+/;
        let arr = rawText.split(delimiter).map(w => w.trim()).filter(w => w.length > 0);
        
        return arr.map(item => {
            let parts = item.split('=');
            let rawEng = parts[0].trim();
            let meaning = parts[1] ? parts[1].trim() : '';
            let cleanEng = rawEng.replace(/-/g, ''); 
            return { rawEng: rawEng, text: cleanEng, meaning: meaning, fillHint: generateFillBlank(cleanEng), type: type };
        });
    }

    function generateFillBlank(word) {
        let arr = word.split(''); let letters = [];
        for(let i=0; i<arr.length; i++) { if(/[a-zA-Z]/.test(arr[i])) letters.push(i); }
        if(letters.length <= 1) return word.replace(/[a-zA-Z]/, '_');
        let numToHide = 1; if(letters.length >= 5) numToHide = 2; if(letters.length >= 7) numToHide = 3;
        letters.sort(() => 0.5 - Math.random());
        for(let i=0; i<numToHide; i++) { arr[letters[i]] = '_'; }
        return arr.join(' ');
    }

    function generateFirstLetterHint(sentence) {
        let words = sentence.split(' ');
        let hintedWords = words.map(word => {
            let res = ""; let firstLetterFound = false;
            for(let i=0; i<word.length; i++) {
                let char = word[i];
                if(/[a-zA-Z]/.test(char)) {
                    if(!firstLetterFound) { res += char; firstLetterFound = true; } 
                    else { res += '<span class="blank-space">_</span>'; }
                } else { res += char; }
            }
            return res;
        });
        return hintedWords.join(' ');
    }

    function scrambleText(text, type) {
        if (type === 'word') {
            let shuffled = text.split('').sort(()=> 0.5-Math.random()).join(' - ');
            while(shuffled.replace(/ - /g, '') === text && text.length > 1) shuffled = text.split('').sort(()=> 0.5-Math.random()).join(' - ');
            return shuffled;
        } else {
            let words = text.split(' ');
            let shuffled = [...words].sort(()=> 0.5-Math.random()).join(' / ');
            while(shuffled.replace(/ \/ /g, ' ') === text && words.length > 1) shuffled = [...words].sort(()=> 0.5-Math.random()).join(' / ');
            return shuffled;
        }
    }

    function saveTasks() {
        const rawWords = document.getElementById('wordInput').value;
        const rawSentences = document.getElementById('sentenceInput').value;
        localStorage.setItem('savedWords', rawWords); localStorage.setItem('savedSentences', rawSentences);
        
        tasks.word = parseInput(rawWords, 'word');
        tasks.sentence = parseInput(rawSentences, 'sentence');

        if (tasks.word.length === 0 && tasks.sentence.length === 0) { alert("請至少準備一項建築材料！"); return; }

        tasks.quiz = [];
        // 將詞語加入 Quiz
        let shuffledWords = [...tasks.word].sort(() => 0.5 - Math.random());
        const quizModes = ['fill', 'scramble', 'dictate'];
        shuffledWords.forEach(w => {
            let rMode = quizModes[Math.floor(Math.random() * quizModes.length)];
            let hint = rMode === 'fill' ? generateFillBlank(w.text) : (rMode === 'scramble' ? scrambleText(w.text, 'word') : '❓❓❓');
            tasks.quiz.push({ ...w, mode: rMode, hint: hint });
        });

        // ⭐ 將句子加入 Quiz (固定使用聽音默寫模式)
        let shuffledSentences = [...tasks.sentence].sort(() => 0.5 - Math.random());
        shuffledSentences.forEach(s => {
            tasks.quiz.push({ ...s, mode: 'dictate', hint: '🎧 聽讀音，打出全句' });
        });

        // 混合打亂詞語和句子
        tasks.quiz.sort(() => 0.5 - Math.random());

        currentIndex = { word: 0, sentence: 0, quiz: 0 }; learningStage = { word: 0, sentence: 0 }; typingCount = { word: 0, sentence: 0 };
        playerCurrentHp = 3; buildProgress = 0; document.getElementById('houseContainer').innerHTML = "";
        
        activeTab = tasks.word.length > 0 ? 'word' : 'sentence';
        switchTab(activeTab); switchMode('kid');
    }

    function switchTab(tabType) {
        if (tasks[tabType].length === 0) { alert(`沒有設定此區的材料喔！`); return; }
        activeTab = tabType;
        document.getElementById('tabWord').classList.toggle('active', tabType === 'word');
        document.getElementById('tabSentence').classList.toggle('active', tabType === 'sentence');
        document.getElementById('tabQuiz').classList.toggle('active', tabType === 'quiz');
        
        const arena = document.getElementById('arena'); const monster = document.getElementById('monster');
        if(tabType === 'quiz') {
            arena.classList.add('arena-quiz');
            monster.innerText = bossList[Math.floor(Math.random() * bossList.length)];
            monster.classList.add('boss-sprite');
        } else {
            arena.classList.remove('arena-quiz');
            monster.innerText = monsterList[currentMonsterIndex];
            monster.classList.remove('boss-sprite');
        }
        document.getElementById('feedbackMessage').innerHTML = ""; updateUI();
    }

    function showFloatingText(text, type, elementId) {
        const target = document.getElementById(elementId); const floatEl = document.createElement('div');
        floatEl.className = `floating-text ${type === 'gain' ? 'text-gain' : 'text-loss'}`; floatEl.innerText = text;
        const rect = target.getBoundingClientRect(); const arenaRect = document.getElementById('arena').getBoundingClientRect();
        floatEl.style.left = (rect.left - arenaRect.left + rect.width/2 - 20) + 'px'; floatEl.style.top = (rect.top - arenaRect.top - 20) + 'px';
        document.getElementById('arena').appendChild(floatEl); setTimeout(() => floatEl.remove(), 1000);
    }

    function triggerFireworks() { confetti({ particleCount: 100, spread: 60, origin: { y: 0.6 }, colors: ['#55FF55', '#FFFFFF', '#FFD700'] }); }

    function updateHpUI() {
        document.getElementById('playerHpDisplay').innerText = '❤️'.repeat(playerCurrentHp) + '🖤'.repeat(3 - playerCurrentHp);
        document.getElementById('monsterHpFill').style.width = Math.min(100, buildProgress) + "%";
    }

    function playerTakeDamage() {
        if (playerCurrentHp > 0) {
            playerCurrentHp--; updateHpUI(); showFloatingText("-1 ❤️", 'loss', 'player');
            const playerEl = document.getElementById('player'); 
            playerEl.classList.remove('animate-hurt'); void playerEl.offsetWidth; playerEl.classList.add('animate-hurt');
            if (playerCurrentHp === 0) { setTimeout(() => { alert("Shino 倒下了！吃顆金蘋果滿血重生繼續蓋屋！"); playerCurrentHp = 3; updateHpUI(); }, 500); }
        }
        isAnimating = false; 
    }

    function triggerMonsterAttack() {
        isAnimating = true; 
        const arena = document.getElementById('arena'); const player = document.getElementById('player'); const monster = document.getElementById('monster');
        monster.classList.remove('animate-throw'); void monster.offsetWidth; monster.classList.add('animate-throw');

        const stone = document.createElement('div'); stone.innerText = '🪨'; stone.style.position = 'absolute'; stone.style.fontSize = '35px'; stone.style.zIndex = '10'; stone.style.filter = 'drop-shadow(2px 2px 0 #000)';
        const mRect = monster.getBoundingClientRect(); const aRect = arena.getBoundingClientRect(); const pRect = player.getBoundingClientRect();
        
        const startX = mRect.left - aRect.left - 20; const startY = mRect.top - aRect.top + 20;
        const endX = pRect.left - aRect.left; const endY = pRect.top - aRect.top + 20;

        stone.style.left = startX + 'px'; stone.style.top = startY + 'px'; arena.appendChild(stone);
        const anim = stone.animate([
            { transform: 'translate(0, 0) rotate(0deg)' },
            { transform: `translate(${(endX - startX)/2}px, -80px) rotate(180deg)` },
            { transform: `translate(${endX - startX}px, ${endY - startY}px) rotate(360deg)` }
        ], { duration: 400, easing: 'ease-in-out' });

        anim.onfinish = () => { stone.remove(); playerTakeDamage(); };
    }

    function checkEquipmentUpdate() {
        const playerEl = document.getElementById('player');
        let newLevel = Math.floor(coins / 20); 
        if (newLevel > 5) newLevel = 5; 

        const equips = [ '👧', '👧🗡️', '🧝‍♀️🗡️', '🧝‍♀️🛡️🗡️', '🦸‍♀️✨', '🦸‍♀️✨🛡️🗡️' ];
        const equipNames = [ '', '【木劍】', '【鐵製裝甲】', '【鐵甲與盾牌】', '【鑽石套裝】', '【終極附魔鑽石裝甲】' ];

        if (newLevel > equipmentLevel) {
            equipmentLevel = newLevel;
            playerEl.classList.remove('animate-upgrade'); void playerEl.offsetWidth; playerEl.classList.add('animate-upgrade');
            triggerFireworks();
            playerEl.innerText = equips[equipmentLevel];
            setTimeout(() => {
                alert(`💎 累積滿 ${equipmentLevel * 20} 粒鑽石！Shino 裝備升級為 ${equipNames[equipmentLevel]}！`);
            }, 300);
        }
    }

    function buildHouse() {
        setTimeout(() => {
            const house = document.getElementById('houseContainer');
            const block = document.createElement('div');
            block.className = 'mc-block'; block.innerText = '🧱'; house.appendChild(block);

            let progressGain = activeTab === 'quiz' ? 50 : 25; 
            let coinGain = activeTab === 'quiz' ? 2 : 1;
            showFloatingText(`+${coinGain} 💎`, 'gain', 'player');
            
            buildProgress += progressGain; coins += coinGain; document.getElementById('coinScore').innerText = coins;
            checkEquipmentUpdate(); 

            if (buildProgress >= 100) {
                buildProgress = 0; playerLevel++; document.getElementById('playerLevel').innerText = playerLevel;
                document.getElementById('feedbackMessage').innerHTML += " <br>🏰 防禦牆築起了！成功阻擋怪獸一波攻擊！";
                triggerFireworks(); 
                setTimeout(() => {
                    house.innerHTML = ""; 
                    const monster = document.getElementById('monster');
                    if(activeTab === 'quiz') monster.innerText = bossList[Math.floor(Math.random() * bossList.length)];
                    else { currentMonsterIndex = (currentMonsterIndex + 1) % monsterList.length; monster.innerText = monsterList[currentMonsterIndex]; }
                }, 1500);
            }
            updateHpUI(); isAnimating = false;
        }, 150);
    }

    function checkAnswer() {
        if (isAnimating) return; 
        const inputField = document.getElementById('spellInput');
        const userInput = inputField.value.replace(/\s+/g, ' ').trim().toLowerCase();
        const currentTaskText = tasks[activeTab][currentIndex[activeTab]].text;
        
        const cleanCorrectAnswer = currentTaskText.replace(/[.!?]$/, '').toLowerCase();
        const cleanUserInput = userInput.replace(/[.!?]$/, '');
        const feedbackMessage = document.getElementById('feedbackMessage');

        if (cleanUserInput === cleanCorrectAnswer) {
            isAnimating = true; inputField.value = ""; buildHouse();

            if(activeTab === 'quiz') {
                feedbackMessage.innerHTML = "🎯 完美防禦大魔王！"; feedbackMessage.className = "correct";
                setTimeout(() => { currentIndex.quiz++; updateUI(); }, 1000);
            } else {
                let currentStage = learningStage[activeTab];
                let targetCount = 1;
                
                if (activeTab === 'word') {
                    if (currentStage === 0) targetCount = 3; 
                    if (currentStage === 1) targetCount = 2; 
                } else if (activeTab === 'sentence') {
                    if (currentStage === 0) targetCount = 3; 
                }

                typingCount[activeTab]++;

                if (typingCount[activeTab] < targetCount) {
                    feedbackMessage.innerHTML = `✨ 很好！放置了方塊！還有 ${targetCount - typingCount[activeTab]} 次！`;
                    feedbackMessage.className = "correct"; inputField.focus(); 
                    if (activeTab === 'word' && currentStage === 1) {
                        tasks.word[currentIndex.word].fillHint = generateFillBlank(currentTaskText);
                    }
                    updateRepeatDots(); return; 
                } else { 
                    typingCount[activeTab] = 0; learningStage[activeTab]++; 
                }

                feedbackMessage.innerHTML = "🎯 階段任務完成！"; feedbackMessage.className = "correct";
                setTimeout(() => {
                    let maxStage = 3;
                    if (learningStage[activeTab] > maxStage) { currentIndex[activeTab]++; learningStage[activeTab] = 0; }
                    updateUI();
                }, 1000);
            }
        } else {
            feedbackMessage.innerHTML = "💦 哎呀，拼錯了！怪獸發動落石攻擊！";
            feedbackMessage.className = "wrong"; inputField.focus(); triggerMonsterAttack(); 
        }
    }

    function rewindWord() {
        learningStage[activeTab] = 0;
        typingCount[activeTab] = 0;
        document.getElementById('feedbackMessage').innerHTML = "🔄 已退回第一階段，重新建立記憶！";
        document.getElementById('feedbackMessage').className = "correct";
        updateUI();
    }

    // ⭐ 新增：支援正常語速與慢速播放
    function speakWord(speedMode = 'normal') {
        if (tasks[activeTab].length === 0) return;
        const currentTask = tasks[activeTab][currentIndex[activeTab]];
        const utterance = new SpeechSynthesisUtterance(currentTask.text);
        utterance.lang = 'en-GB'; 
        
        // 根據參數調整語速
        if (speedMode === 'slow') {
            utterance.rate = 0.4; // 慢速
        } else {
            utterance.rate = currentTask.type === 'sentence' ? 0.7 : 0.8; // 正常速度
        }
        
        window.speechSynthesis.speak(utterance);
    }

    function formatPhonicsWord(rawText) {
        const vowels = ['a', 'e', 'i', 'o', 'u']; let formatted = '';
        for (let char of rawText) {
            if (char === '-') {
                formatted += `<span class="syllable-dot">/</span>`; 
            } else if (vowels.includes(char.toLowerCase())) {
                formatted += `<span class="vowel">${char}</span>`;
            } else if (/[a-zA-Z]/.test(char)) {
                formatted += `<span class="consonant">${char}</span>`;
            } else {
                formatted += char; 
            }
        }
        return formatted;
    }

    function updateRepeatDots() {
        const dotsContainer = document.getElementById('repeatDots');
        let isWordNeedsDots = activeTab === 'word' && (learningStage.word === 0 || learningStage.word === 1);
        let isSentenceNeedsDots = activeTab === 'sentence' && learningStage.sentence === 0;

        if (isWordNeedsDots || isSentenceNeedsDots) {
            dotsContainer.style.display = "block"; let dots = "";
            let maxDots = 1;
            if (activeTab === 'word' && learningStage.word === 0) maxDots = 3;
            if (activeTab === 'word' && learningStage.word === 1) maxDots = 2;
            if (activeTab === 'sentence' && learningStage.sentence === 0) maxDots = 3;

            for(let i=0; i<maxDots; i++) dots += (i < typingCount[activeTab]) ? "🟩" : "⬜"; 
            dotsContainer.innerText = dots;
        } else { dotsContainer.style.display = "none"; }
    }

    function updateUI() {
        const currentList = tasks[activeTab];
        const cIndex = currentIndex[activeTab];

        if (cIndex >= currentList.length) {
            document.getElementById('progressText').innerText = "✅ 本區所有任務已完成！";
            document.getElementById('stageBadge').className = "hidden";
            document.getElementById('hintBox').innerHTML = `🏆 勝利！請點擊上方切換其他挑戰！`;
            document.getElementById('meaningBox').classList.add('hidden');
            document.getElementById('spellInput').classList.add('hidden');
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('rewindBtn').classList.add('hidden');
            document.getElementById('repeatDots').classList.add('hidden');
            return;
        }

        const taskArea = document.getElementById('taskArea');
        const currentTask = currentList[cIndex];
        const isSentence = currentTask.type === 'sentence';
        
        // 根據題目類型切換縮小字體樣式
        isSentence ? taskArea.classList.add('sentence-mode') : taskArea.classList.remove('sentence-mode');
        
        document.getElementById('progressText').innerText = `任務進度：${cIndex + 1} / ${currentList.length}`;
        const badge = document.getElementById('stageBadge');
        const hintBox = document.getElementById('hintBox');
        const meaningBox = document.getElementById('meaningBox');
        const rewindBtn = document.getElementById('rewindBtn');

        if (currentTask.meaning) {
            meaningBox.innerText = `💡 ${currentTask.meaning}`;
            meaningBox.classList.remove('hidden');
        } else {
            meaningBox.classList.add('hidden');
        }

        if(activeTab === 'quiz') {
            let modeName = "";
            if (isSentence) {
                modeName = "聽音默句";
            } else {
                modeName = currentTask.mode === 'fill' ? '填空格' : (currentTask.mode === 'scramble' ? '重組字' : '全默寫');
            }
            badge.innerText = `👑 突襲：${modeName}`; badge.className = `stage-badge stage-quiz`;
            hintBox.innerHTML = currentTask.hint.replace(/_/g, '<span class="blank-space">_</span>'); 
            rewindBtn.classList.add('hidden');
        } else {
            const cStage = learningStage[activeTab]; 
            badge.innerText = stageNames[activeTab][cStage]; badge.className = `stage-badge stage-${cStage}`;
            
            if (activeTab === 'word') {
                if (cStage === 0) hintBox.innerHTML = formatPhonicsWord(currentTask.rawEng); 
                else if (cStage === 1) hintBox.innerHTML = currentTask.fillHint.replace(/_/g, '<span class="blank-space">_</span>');
                else if (cStage === 2) hintBox.innerText = scrambleText(currentTask.text, 'word');
                else if (cStage === 3) hintBox.innerText = "❓❓❓"; 
                
                if (cStage >= 2) rewindBtn.classList.remove('hidden');
                else rewindBtn.classList.add('hidden');

            } else {
                if (cStage === 0) hintBox.innerHTML = formatPhonicsWord(currentTask.rawEng); 
                else if (cStage === 1) hintBox.innerText = scrambleText(currentTask.text, 'sentence');
                else if (cStage === 2) hintBox.innerHTML = generateFirstLetterHint(currentTask.text); 
                else if (cStage === 3) hintBox.innerText = "❓❓❓"; 

                if (cStage >= 2) rewindBtn.classList.remove('hidden');
                else rewindBtn.classList.add('hidden');
            }
        }

        updateRepeatDots(); updateHpUI();
        const inputField = document.getElementById('spellInput');
        inputField.value = ""; inputField.classList.remove('hidden'); inputField.focus();
        document.getElementById('submitBtn').classList.remove('hidden');
        speakWord('normal'); 
    }

    document.getElementById("spellInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") { event.preventDefault(); checkAnswer(); }
    });

    function switchMode(mode) {
        if (mode === 'kid') {
            document.getElementById('parentMode').classList.add('hidden'); document.getElementById('kidMode').classList.remove('hidden');
        } else {
            document.getElementById('parentMode').classList.remove('hidden'); document.getElementById('kidMode').classList.add('hidden');
            window.speechSynthesis.cancel();
        }
    }
</script>
