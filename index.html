<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動英文溫習小助手 - 詞語升級版</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* 改用較活潑的字體 */
            background-color: #e8f4f8;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        .hidden { display: none; }
        
        /* 學習進度標籤 */
        .stage-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .stage-0 { background-color: #3498db; } /* 認字 */
        .stage-1 { background-color: #9b59b6; } /* 重組 */
        .stage-2 { background-color: #e74c3c; } /* 默寫 */

        /* 提示區升級 (大字體與拼音間距) */
        #hintBox {
            font-size: 56px; /* 放大字體 */
            font-weight: bold;
            letter-spacing: 8px; /* 增加字母間距，方便辨識 */
            background-color: #fff9e6; /* 溫和的淺黃色背景 */
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            min-height: 70px;
            border: 3px dashed #f1c40f;
        }

        /* 母音與子音顏色 (由 JavaScript 動態加入) */
        .vowel { color: #e74c3c; }    /* 紅色母音 */
        .consonant { color: #2980b9; } /* 藍色子音 */

        /* 連續打三次的進度燈號 */
        #repeatDots {
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        /* 按鈕與輸入框設計 (維持圓潤可愛風格) */
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #27ae60; transform: translateY(-2px); }
        .btn-voice { background-color: #f39c12; border-radius: 50px; font-size: 20px;}
        .btn-voice:hover { background-color: #d68910; }
        .btn-back { background-color: #95a5a6; font-size: 14px; padding: 8px 15px;}
        
        textarea {
            width: 90%;
            height: 100px;
            padding: 15px;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #bdc3c7;
            margin-bottom: 10px;
        }
        input[type="text"] {
            width: 80%;
            padding: 15px;
            font-size: 32px; /* 放大輸入字體 */
            text-align: center;
            border-radius: 10px;
            border: 3px solid #3498db;
            margin: 10px 0;
            outline: none;
            font-weight: bold;
        }
        input[type="text"]:focus { border-color: #2ecc71; }
        
        #feedbackMessage {
            font-size: 22px;
            font-weight: bold;
            margin: 15px 0;
            min-height: 35px;
        }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
        #progressText { color: #7f8c8d; font-size: 16px; margin-bottom: 10px; font-weight: bold;}
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 互動英文溫習小助手</h1>

    <!-- 家長設定區 -->
    <div id="parentMode">
        <h2>✏️ 學習清單設定</h2>
        <p>請輸入今天要溫習的生字（用逗號或換行隔開）：</p>
        <textarea id="wordInput" placeholder="例如: apple, beautiful, elephant"></textarea><br>
        <button onclick="saveWords()">💾 儲存並開始溫習</button>
    </div>

    <!-- 小朋友溫習區 -->
    <div id="kidMode" class="hidden">
        <button class="btn-back" onclick="switchMode('parent')" style="float: left;">⬅️ 返回設定</button>
        <div style="clear: both;"></div>
        
        <div id="progressText">詞語進度：1 / 5</div>
        
        <!-- 當前學習階段標籤 -->
        <div id="stageBadge" class="stage-badge stage-0">第一關：眼望望，跟住打</div>
        
        <!-- 三次輸入進度燈號 (只有第一關顯示) -->
        <div id="repeatDots"></div>

        <div>
            <button class="btn-voice" onclick="speakWord()">🔊 聽讀音</button>
        </div>

        <!-- 視覺提示區 -->
        <div id="hintBox">APPLE</div>
        
        <input type="text" id="spellInput" placeholder="請輸入英文..." autocomplete="off">
        <br>
        
        <button id="submitBtn" onclick="checkAnswer()">確定</button>
        
        <div id="feedbackMessage"></div>
    </div>
</div>

<script>
    let words = [];
    let currentIndex = 0;
    let learningStage = 0; // 0: 認字, 1: 重組, 2: 默寫
    let typingCount = 0;   // 記錄第一關打了幾次 (目標 3 次)

    const stageNames = [
        "第一關：眼望望，跟住打 👀", 
        "第二關：拆字謎，重組它 🧩", 
        "第三關：靠記憶，自己默 🧠"
    ];

    window.onload = function() {
        const savedWords = localStorage.getItem('dictationWords');
        if (savedWords) {
            document.getElementById('wordInput').value = savedWords;
        }
    };

    function saveWords() {
        const rawText = document.getElementById('wordInput').value;
        if (!rawText.trim()) {
            alert("請先輸入生字！");
            return;
        }
        localStorage.setItem('dictationWords', rawText);
        words = rawText.split(/[\n,]+/).map(w => w.trim()).filter(w => w.length > 0);
        
        if (words.length > 0) {
            currentIndex = 0;
            learningStage = 0;
            typingCount = 0;
            switchMode('kid');
            updateUI();
        }
    }

    function speakWord() {
        if (words.length === 0) return;
        const utterance = new SpeechSynthesisUtterance(words[currentIndex]);
        utterance.lang = 'en-GB'; 
        utterance.rate = 0.8; 
        window.speechSynthesis.speak(utterance);
    }

    // 將字母分色 (母音紅色，子音藍色)
    function formatPhonicsWord(word) {
        if(word.includes(" ")) return word; // 如果是句子暫不處理
        const vowels = ['a', 'e', 'i', 'o', 'u'];
        let formatted = '';
        for (let char of word) {
            if (vowels.includes(char.toLowerCase())) {
                formatted += `<span class="vowel">${char}</span>`;
            } else if (/[a-zA-Z]/.test(char)) {
                formatted += `<span class="consonant">${char}</span>`;
            } else {
                formatted += char; // 處理連字號等符號
            }
        }
        return formatted;
    }

    function scrambleWord(word) {
        if(word.includes(" ")) return word; 
        let shuffled = word.split('').sort(function(){return 0.5-Math.random()}).join(' - ');
        while(shuffled.replace(/ - /g, '') === word && word.length > 1) {
            shuffled = word.split('').sort(function(){return 0.5-Math.random()}).join(' - ');
        }
        return shuffled;
    }

    function updateRepeatDots() {
        const dotsContainer = document.getElementById('repeatDots');
        if (learningStage === 0) {
            dotsContainer.style.display = "block";
            let dots = "";
            for(let i=0; i<3; i++) {
                dots += (i < typingCount) ? "🟢" : "⚪";
            }
            dotsContainer.innerText = dots;
        } else {
            dotsContainer.style.display = "none";
        }
    }

    function checkAnswer() {
        const userInput = document.getElementById('spellInput').value.trim().toLowerCase();
        const correctAnswer = words[currentIndex].toLowerCase();
        const feedbackMessage = document.getElementById('feedbackMessage');
        const inputField = document.getElementById('spellInput');

        if (userInput === correctAnswer) {
            inputField.value = ""; // 先清空輸入框
            
            // 第一關：需要打對 3 次
            if (learningStage === 0) {
                typingCount++;
                updateRepeatDots();
                
                if (typingCount < 3) {
                    feedbackMessage.innerHTML = `✨ 很好！還有 ${3 - typingCount} 次！`;
                    feedbackMessage.className = "correct";
                    inputField.focus();
                    return; // 還沒滿3次，繼續留在第一關
                } else {
                    typingCount = 0; // 滿3次，歸零準備下一個字用
                    learningStage++; // 升級到第二關
                }
            } else {
                // 第二關、第三關只要打對 1 次就過關
                learningStage++;
            }

            feedbackMessage.innerHTML = "🎉 太棒了！過關！";
            feedbackMessage.className = "correct";
            
            setTimeout(() => {
                if (learningStage > 2) {
                    currentIndex++;
                    learningStage = 0;
                }
                updateUI();
            }, 1000);

        } else {
            feedbackMessage.innerHTML = "🤔 哎呀，差一點點，再看清楚試一次！";
            feedbackMessage.className = "wrong";
            inputField.value = ""; 
            inputField.focus();
        }
    }

    function updateUI() {
        if (currentIndex >= words.length) {
            document.getElementById('progressText').innerText = "✅ 完成所有詞語！";
            document.getElementById('stageBadge').className = "hidden";
            document.getElementById('hintBox').innerHTML = "🎉 太厲害了！你完成了今天的溫習！";
            document.getElementById('spellInput').classList.add('hidden');
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('repeatDots').classList.add('hidden');
            document.getElementById('feedbackMessage').innerHTML = "";
            return;
        }

        const currentWord = words[currentIndex];
        
        document.getElementById('progressText').innerText = `詞語進度：${currentIndex + 1} / ${words.length}`;
        const badge = document.getElementById('stageBadge');
        badge.innerText = stageNames[learningStage];
        badge.className = `stage-badge stage-${learningStage}`;
        
        const hintBox = document.getElementById('hintBox');
        if (learningStage === 0) {
            hintBox.innerHTML = formatPhonicsWord(currentWord); // 使用多色 Phonics 顯示
        } else if (learningStage === 1) {
            hintBox.innerText = scrambleWord(currentWord);
        } else if (learningStage === 2) {
            hintBox.innerText = "❓❓❓"; 
        }

        updateRepeatDots(); // 更新圈圈燈號

        const inputField = document.getElementById('spellInput');
        inputField.value = "";
        inputField.classList.remove('hidden');
        inputField.focus();
        
        document.getElementById('feedbackMessage').innerHTML = "";
        document.getElementById('submitBtn').classList.remove('hidden');
        
        speakWord(); 
    }

    document.getElementById("spellInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            checkAnswer();
        }
    });

    function switchMode(mode) {
        if (mode === 'kid') {
            document.getElementById('parentMode').classList.add('hidden');
            document.getElementById('kidMode').classList.remove('hidden');
        } else {
            document.getElementById('parentMode').classList.remove('hidden');
            document.getElementById('kidMode').classList.add('hidden');
            window.speechSynthesis.cancel();
        }
    }
</script>

</body>
</html>
