<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動英文溫習小助手 - Shino 防禦戰</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* 模擬像素遊戲的字體與背景 */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #2c2c2c; color: #ffffff; text-align: center; padding: 10px; margin: 0; overflow-x: hidden; 
        }
        .container { 
            max-width: 650px; margin: 0 auto; background: #8B8B8B; padding: 20px; 
            border: 4px solid #55555; box-shadow: inset -4px -4px 0px 0px #333, inset 4px 4px 0px 0px #ccc; position: relative; 
        }
        h1 { color: #55FF55; margin-top: 5px; font-size: 28px; text-shadow: 2px 2px #000;}
        .hidden { display: none !important; }
        
        .tab-container { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .tab-btn { 
            background-color: #707070; color: white; padding: 10px 5px; cursor: pointer; font-size: 16px; font-weight: bold; 
            border: 2px solid #333; border-bottom: none; box-shadow: inset 2px 2px 0px #999; flex-grow: 1; 
        }
        .tab-btn.active { background-color: #55FF55; color: #000; box-shadow: inset 2px 2px 0px #AAFFAA; }
        .tab-quiz.active { background-color: #AA00AA; color: #FFF; box-shadow: inset 2px 2px 0px #FF55FF; }

        .game-hud { 
            display: flex; justify-content: space-between; background-color: #333; padding: 10px 20px; 
            margin-bottom: 15px; font-size: 20px; font-weight: bold; border: 4px solid #555; color: #FFF; 
        }
        .player-hp { color: #FF5555; font-size: 22px; letter-spacing: 2px;}

        /* 戰鬥區設計 */
        .battle-arena { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            background: linear-gradient(to bottom, #7EC0EE 60%, #3CB371 60%, #8B4513 100%); 
            height: 180px; margin-bottom: 20px; padding: 10px 20px; border: 4px solid #333; position: relative; 
        }
        .arena-quiz { background: linear-gradient(to bottom, #2C002C 60%, #550055 60%, #000000 100%); border-color: #FF55FF;}
        
        .entity-area { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 5;}
        .sprite { font-size: 80px; transition: transform 0.1s; }
        .monster-sprite { font-size: 80px; }
        .boss-sprite { font-size: 100px; filter: drop-shadow(0 0 10px #FF55FF); }

        /* 建築區 (加寬的牆壁) */
        #houseContainer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-wrap: wrap-reverse; align-content: flex-start; justify-content: center;
            width: 200px; /* 加寬為 5 格 */
            height: 120px; z-index: 3;
        }
        .mc-block { 
            font-size: 40px; width: 40px; height: 40px; line-height: 40px; 
            margin-top: -5px; animation: dropIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .hp-label { font-size: 16px; font-weight: bold; color: #FFF; margin-bottom: 2px; text-shadow: 2px 2px #000;}
        .hp-bar-container { width: 100px; height: 14px; background-color: #333; margin-bottom: 5px; border: 2px solid #000; overflow: hidden; }
        .hp-fill { height: 100%; width: 0%; transition: width 0.3s ease; background-color: #8B4513; border-top: 4px solid #55FF55; }

        @keyframes dropIn { 0% { transform: translateY(-50px) scale(1.5); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes hitShake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-15px); } }
        @keyframes playerHurt { 0%, 100% { filter: none; transform: translateX(0); } 50% { filter: drop-shadow(0 0 15px red) sepia(1) hue-rotate(-50deg); transform: translateX(-10px); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }
        @keyframes monsterThrow { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.1); } }

        .animate-hit { animation: hitShake 0.4s; }
        .animate-hurt { animation: playerHurt 0.4s; }
        .animate-throw { animation: monsterThrow 0.3s; }
        .floating-text { position: absolute; font-size: 28px; font-weight: bold; z-index: 10; pointer-events: none; animation: floatUp 1s ease-out forwards; text-shadow: 2px 2px #000; }
        .text-gain { color: #55FF55; } .text-loss { color: #FF5555; }

        .stage-badge { display: inline-block; padding: 8px 15px; font-weight: bold; color: white; margin-bottom: 10px; font-size: 16px; border: 2px solid #000; }
        .stage-0 { background-color: #3333AA; } .stage-1 { background-color: #AA5500; } .stage-2 { background-color: #AA00AA; } .stage-3 { background-color: #AA0000; }
        .stage-quiz { background-color: #FF55FF; color: #000; }

        #hintBox { 
            font-size: 40px; font-weight: bold; letter-spacing: 5px; background-color: #000; color: #FFF; 
            padding: 15px; margin: 10px 0; min-height: 60px; border: 4px dashed #555; word-wrap: break-word; 
        }
        .sentence-mode #hintBox { font-size: 24px; letter-spacing: 2px; }
        .vowel { color: #FF5555; } .consonant { color: #55FFFF; } 
        .blank-space { color: #FFFF55; letter-spacing: 2px; font-weight: bold;} 

        textarea { width: 85%; height: 70px; padding: 10px; font-family: 'Courier New', Courier, monospace; font-size: 16px; border: 4px solid #333; margin-bottom: 15px; background: #E0E0E0; }
        .input-group { background: #555; padding: 15px; border: 4px solid #333; margin-bottom: 15px;}
        .input-group h3 { margin: 0 0 10px 0; color: #55FF55; text-align: left; padding-left: 20px; text-shadow: 1px 1px #000;}
        
        button { 
            background-color: #707070; color: white; border: 4px solid #333; padding: 12px 25px; 
            font-size: 18px; cursor: pointer; font-weight: bold; font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 4px 4px 0px #999, inset -4px -4px 0px #555; text-shadow: 2px 2px #000;
        }
        button:active { box-shadow: inset 4px 4px 0px #555, inset -4px -4px 0px #999; }
        .btn-voice { background-color: #FFAA00; box-shadow: inset 4px 4px 0px #FFCC55, inset -4px -4px 0px #CC8800;}
        .btn-back { background-color: #555; font-size: 14px; padding: 8px 15px; margin-bottom:10px; box-shadow: inset 2px 2px 0px #777, inset -2px -2px 0px #333;}
        
        input[type="text"] { 
            width: 85%; padding: 15px; font-size: 24px; text-align: center; border: 4px solid #000; 
            margin: 10px 0; outline: none; font-weight: bold; font-family: 'Courier New', Courier, monospace;
            background: #FFF; box-shadow: inset 4px 4px 0px #CCC;
        }
        input[type="text"]:focus { border-color: #55FF55; }
        #feedbackMessage { font-size: 20px; font-weight: bold; margin: 10px 0; min-height: 30px; text-shadow: 2px 2px #000;}
        .correct { color: #55FF55; } .wrong { color: #FF5555; }
        #progressText { color: #FFF; font-size: 14px; font-weight: bold; margin-bottom: 5px; text-shadow: 1px 1px #000;}
        #repeatDots { font-size: 20px; margin-bottom: 10px; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚔️ Shino 方塊守護戰</h1>

    <div id="parentMode">
        <p>準備建築材料（溫習內容）：</p>
        <div class="input-group">
            <h3>📝 詞語區 (以逗號或換行隔開)</h3>
            <textarea id="wordInput" placeholder="apple, beautiful, elephant"></textarea>
        </div>
        <div class="input-group">
            <h3 style="color: #55FFFF;">💬 句子區 (每行一句)</h3>
            <textarea id="sentenceInput" placeholder="I have a pen.&#10;She is eating an apple."></textarea>
        </div>
        <button onclick="saveTasks()" style="font-size: 22px; padding: 15px 40px; background-color: #55FF55; color: #000; text-shadow: none;">⚔️ 開始建造防禦牆！</button>
    </div>

    <div id="kidMode" class="hidden">
        <div class="tab-container">
            <button id="tabWord" class="tab-btn active" onclick="switchTab('word')">🗡️ 詞語挑戰</button>
            <button id="tabSentence" class="tab-btn" onclick="switchTab('sentence')">🛡️ 句子挑戰</button>
            <button id="tabQuiz" class="tab-btn tab-quiz" onclick="switchTab('quiz')">👑 終極突襲</button>
        </div>

        <div class="game-hud">
            <span class="player-hp" id="playerHpDisplay">❤️❤️❤️</span>
            <span>💎 <span id="coinScore">0</span></span>
            <span>🏆 LV.<span id="playerLevel">1</span></span>
        </div>

        <div class="battle-arena" id="arena">
            <div class="entity-area">
                <div class="hp-label">Shino</div>
                <div id="player" class="sprite">👧</div>
            </div>
            
            <!-- 加寬的防禦牆 -->
            <div id="houseContainer"></div>

            <div class="entity-area">
                <div class="hp-label">建築進度</div>
                <div class="hp-bar-container">
                    <div id="monsterHpFill" class="hp-fill"></div>
                </div>
                <div id="monster" class="sprite monster-sprite">🐷</div>
            </div>
        </div>

        <button class="btn-back" onclick="switchMode('parent')">🏳️ 撤退修改</button>
        <button class="btn-voice" onclick="speakWord()">🔊 聽音效</button>

        <div id="progressText">任務進度：1 / 5</div>
        <div id="stageBadge" class="stage-badge stage-0">第一關</div>
        <div id="repeatDots"></div>

        <div id="taskArea">
            <div id="hintBox">APPLE</div>
            <input type="text" id="spellInput" placeholder="輸入指令放置方塊..." autocomplete="off">
            <br>
            <button id="submitBtn" onclick="checkAnswer()">🧱 放置方塊！</button>
            <div id="feedbackMessage"></div>
        </div>
    </div>
</div>

<script>
    let tasks = { word: [], sentence: [], quiz: [] };
    let currentIndex = { word: 0, sentence: 0, quiz: 0 };
    let learningStage = { word: 0, sentence: 0 }; 
    let typingCount = { word: 0, sentence: 0 };
    let activeTab = 'word';
    let isAnimating = false; 
    
    let coins = 0;
    let playerLevel = 1;
    let playerCurrentHp = 3;
    let buildProgress = 0; 
    const monsterList = ['🐷', '🧟‍♂️', '🕷️', '💀', '🏹']; 
    const bossList = ['🐉', '🌋', '👾']; 
    let currentMonsterIndex = 0;

    const stageNames = {
        word: ["第一階段：睇清楚，跟住打 👀", "第二階段：填空格，估下字 🕳️", "第三階段：拆字謎，拼拼圖 🧩", "第四階段：靠記憶，自己默 🧠"],
        sentence: ["第一階段：睇原句，照住打 👀", "第二階段：單字亂了，排番好 🧩", "第三階段：字頭提示，記憶挑戰 🅰️", "第四階段：聽讀音，全句默寫 🧠"]
    };

    window.onload = function() {
        if (localStorage.getItem('savedWords')) document.getElementById('wordInput').value = localStorage.getItem('savedWords');
        if (localStorage.getItem('savedSentences')) document.getElementById('sentenceInput').value = localStorage.getItem('savedSentences');
    };

    function generateFillBlank(word) {
        let arr = word.split(''); let letters = [];
        for(let i=0; i<arr.length; i++) { if(/[a-zA-Z]/.test(arr[i])) letters.push(i); }
        if(letters.length <= 1) return word.replace(/[a-zA-Z]/, '_');
        let numToHide = 1; if(letters.length >= 5) numToHide = 2; if(letters.length >= 7) numToHide = 3;
        letters.sort(() => 0.5 - Math.random());
        for(let i=0; i<numToHide; i++) { arr[letters[i]] = '_'; }
        return arr.join(' ');
    }

    function generateFirstLetterHint(sentence) {
        let words = sentence.split(' ');
        let hintedWords = words.map(word => {
            let res = ""; let firstLetterFound = false;
            for(let i=0; i<word.length; i++) {
                let char = word[i];
                if(/[a-zA-Z]/.test(char)) {
                    if(!firstLetterFound) { res += char; firstLetterFound = true; } 
                    else { res += '<span class="blank-space">_</span>'; }
                } else { res += char; }
            }
            return res;
        });
        return hintedWords.join(' ');
    }

    function scrambleText(text, type) {
        if (type === 'word') {
            let shuffled = text.split('').sort(()=> 0.5-Math.random()).join(' - ');
            while(shuffled.replace(/ - /g, '') === text && text.length > 1) shuffled = text.split('').sort(()=> 0.5-Math.random()).join(' - ');
            return shuffled;
        } else {
            let words = text.split(' ');
            let shuffled = [...words].sort(()=> 0.5-Math.random()).join(' / ');
            while(shuffled.replace(/ \/ /g, ' ') === text && words.length > 1) shuffled = [...words].sort(()=> 0.5-Math.random()).join(' / ');
            return shuffled;
        }
    }

    function saveTasks() {
        const rawWords = document.getElementById('wordInput').value;
        const rawSentences = document.getElementById('sentenceInput').value;
        localStorage.setItem('savedWords', rawWords); localStorage.setItem('savedSentences', rawSentences);
        
        const wArray = rawWords.split(/[\n,]+/).map(w => w.trim()).filter(w => w.length > 0);
        tasks.word = wArray.map(w => ({ text: w, fillHint: generateFillBlank(w) }));
        tasks.sentence = rawSentences.split('\n').map(s => s.trim()).filter(s => s.length > 0).map(s => ({ text: s }));

        if (tasks.word.length === 0 && tasks.sentence.length === 0) { alert("請至少準備一項建築材料！"); return; }

        tasks.quiz = [];
        let shuffledWords = [...wArray].sort(() => 0.5 - Math.random());
        const quizModes = ['fill', 'scramble', 'dictate'];
        shuffledWords.forEach(w => {
            let rMode = quizModes[Math.floor(Math.random() * quizModes.length)];
            let hint = rMode === 'fill' ? generateFillBlank(w) : (rMode === 'scramble' ? scrambleText(w, 'word') : '❓❓❓');
            tasks.quiz.push({ text: w, mode: rMode, hint: hint });
        });

        currentIndex = { word: 0, sentence: 0, quiz: 0 }; learningStage = { word: 0, sentence: 0 }; typingCount = { word: 0, sentence: 0 };
        playerCurrentHp = 3; buildProgress = 0; document.getElementById('houseContainer').innerHTML = "";
        
        activeTab = tasks.word.length > 0 ? 'word' : 'sentence';
        switchTab(activeTab); switchMode('kid');
    }

    function switchTab(tabType) {
        if (tasks[tabType].length === 0) { alert(`沒有設定此區的材料喔！`); return; }
        activeTab = tabType;
        document.getElementById('tabWord').classList.toggle('active', tabType === 'word');
        document.getElementById('tabSentence').classList.toggle('active', tabType === 'sentence');
        document.getElementById('tabQuiz').classList.toggle('active', tabType === 'quiz');
        
        const arena = document.getElementById('arena'); const monster = document.getElementById('monster');
        if(tabType === 'quiz') {
            arena.classList.add('arena-quiz');
            monster.innerText = bossList[Math.floor(Math.random() * bossList.length)];
            monster.classList.add('boss-sprite');
        } else {
            arena.classList.remove('arena-quiz');
            monster.innerText = monsterList[currentMonsterIndex];
            monster.classList.remove('boss-sprite');
        }
        document.getElementById('feedbackMessage').innerHTML = ""; updateUI();
    }

    function showFloatingText(text, type, elementId) {
        const target = document.getElementById(elementId); const floatEl = document.createElement('div');
        floatEl.className = `floating-text ${type === 'gain' ? 'text-gain' : 'text-loss'}`; floatEl.innerText = text;
        const rect = target.getBoundingClientRect(); const arenaRect = document.getElementById('arena').getBoundingClientRect();
        floatEl.style.left = (rect.left - arenaRect.left + rect.width/2 - 20) + 'px'; floatEl.style.top = (rect.top - arenaRect.top - 20) + 'px';
        document.getElementById('arena').appendChild(floatEl); setTimeout(() => floatEl.remove(), 1000);
    }

    function triggerFireworks() { confetti({ particleCount: 100, spread: 60, origin: { y: 0.6 }, colors: ['#55FF55', '#FFFFFF', '#8B4513'] }); }

    function updateHpUI() {
        document.getElementById('playerHpDisplay').innerText = '❤️'.repeat(playerCurrentHp) + '🖤'.repeat(3 - playerCurrentHp);
        document.getElementById('monsterHpFill').style.width = Math.min(100, buildProgress) + "%";
    }

    function playerTakeDamage() {
        if (playerCurrentHp > 0) {
            playerCurrentHp--; updateHpUI(); showFloatingText("-1 ❤️", 'loss', 'player');
            const playerEl = document.getElementById('player'); 
            playerEl.classList.remove('animate-hurt'); void playerEl.offsetWidth; playerEl.classList.add('animate-hurt');
            if (playerCurrentHp === 0) { setTimeout(() => { alert("Shino 倒下了！吃顆金蘋果滿血重生繼續蓋屋！"); playerCurrentHp = 3; updateHpUI(); }, 500); }
        }
        isAnimating = false; // 解除鎖定
    }

    // 怪獸投石攻擊動畫
    function triggerMonsterAttack() {
        isAnimating = true; // 鎖定操作
        const arena = document.getElementById('arena');
        const player = document.getElementById('player');
        const monster = document.getElementById('monster');
        
        // 怪獸攻擊動作
        monster.classList.remove('animate-throw'); void monster.offsetWidth; monster.classList.add('animate-throw');

        // 創造石頭
        const stone = document.createElement('div');
        stone.innerText = '🪨';
        stone.style.position = 'absolute';
        stone.style.fontSize = '35px';
        stone.style.zIndex = '10';
        
        // 計算拋物線軌跡
        const mRect = monster.getBoundingClientRect();
        const aRect = arena.getBoundingClientRect();
        const pRect = player.getBoundingClientRect();
        
        const startX = mRect.left - aRect.left - 20;
        const startY = mRect.top - aRect.top + 20;
        const endX = pRect.left - aRect.left;
        const endY = pRect.top - aRect.top + 20;

        stone.style.left = startX + 'px';
        stone.style.top = startY + 'px';
        arena.appendChild(stone);

        // 飛行與旋轉動畫
        const anim = stone.animate([
            { transform: 'translate(0, 0) rotate(0deg)' },
            { transform: `translate(${(endX - startX)/2}px, -80px) rotate(180deg)` },
            { transform: `translate(${endX - startX}px, ${endY - startY}px) rotate(360deg)` }
        ], { duration: 400, easing: 'ease-in-out' });

        anim.onfinish = () => {
            stone.remove();
            playerTakeDamage(); // 砸中後扣血
        };
    }

    function buildHouse() {
        setTimeout(() => {
            const house = document.getElementById('houseContainer');
            const block = document.createElement('div');
            block.className = 'mc-block';
            block.innerText = ['🧱', '🪵', '🟫', '🪨'][Math.floor(Math.random() * 4)]; 
            house.appendChild(block);

            let progressGain = activeTab === 'quiz' ? 50 : 25; // 稍微調降進度，讓牆可以蓋多一點方塊
            let coinGain = activeTab === 'quiz' ? 2 : 1;
            showFloatingText(`+${coinGain} 💎`, 'gain', 'player');
            
            buildProgress += progressGain; coins += coinGain; document.getElementById('coinScore').innerText = coins;
            
            if (buildProgress >= 100) {
                buildProgress = 0; playerLevel++; document.getElementById('playerLevel').innerText = playerLevel;
                document.getElementById('feedbackMessage').innerHTML += " <br>🏰 防禦牆築起了！成功阻擋怪獸一波攻擊！";
                triggerFireworks(); 
                
                setTimeout(() => {
                    house.innerHTML = ""; // 清空牆壁準備下一關
                    const monster = document.getElementById('monster');
                    if(activeTab === 'quiz') monster.innerText = bossList[Math.floor(Math.random() * bossList.length)];
                    else { currentMonsterIndex = (currentMonsterIndex + 1) % monsterList.length; monster.innerText = monsterList[currentMonsterIndex]; }
                }, 1500);
            }
            updateHpUI(); isAnimating = false;
        }, 150);
    }

    function checkAnswer() {
        if (isAnimating) return; 
        const inputField = document.getElementById('spellInput');
        const userInput = inputField.value.replace(/\s+/g, ' ').trim().toLowerCase();
        const currentTaskText = tasks[activeTab][currentIndex[activeTab]].text;
        
        const cleanCorrectAnswer = currentTaskText.replace(/[.!?]$/, '').toLowerCase();
        const cleanUserInput = userInput.replace(/[.!?]$/, '');
        const feedbackMessage = document.getElementById('feedbackMessage');

        if (cleanUserInput === cleanCorrectAnswer) {
            isAnimating = true; inputField.value = ""; buildHouse();

            if(activeTab === 'quiz') {
                feedbackMessage.innerHTML = "🎯 完美防禦大魔王！"; feedbackMessage.className = "correct";
                setTimeout(() => { currentIndex.quiz++; updateUI(); }, 1000);
            } else {
                let currentStage = learningStage[activeTab];
                let targetCount = 1;
                
                if (activeTab === 'word') {
                    if (currentStage === 0) targetCount = 3; 
                    if (currentStage === 1) targetCount = 2; 
                } else if (activeTab === 'sentence') {
                    if (currentStage === 0) targetCount = 3; 
                }

                typingCount[activeTab]++;

                if (typingCount[activeTab] < targetCount) {
                    feedbackMessage.innerHTML = `✨ 很好！放置了方塊！還有 ${targetCount - typingCount[activeTab]} 次！`;
                    feedbackMessage.className = "correct"; inputField.focus(); 
                    if (activeTab === 'word' && currentStage === 1) {
                        tasks.word[currentIndex.word].fillHint = generateFillBlank(currentTaskText);
                        document.getElementById('hintBox').innerHTML = tasks.word[currentIndex.word].fillHint.replace(/_/g, '<span class="blank-space">_</span>');
                    }
                    updateRepeatDots(); return; 
                } else { 
                    typingCount[activeTab] = 0; learningStage[activeTab]++; 
                }

                feedbackMessage.innerHTML = "🎯 階段任務完成！"; feedbackMessage.className = "correct";
                setTimeout(() => {
                    let maxStage = 3;
                    if (learningStage[activeTab] > maxStage) { currentIndex[activeTab]++; learningStage[activeTab] = 0; }
                    updateUI();
                }, 1000);
            }
        } else {
            feedbackMessage.innerHTML = "💦 哎呀，拼錯了！豬豬發動落石攻擊！";
            feedbackMessage.className = "wrong"; 
            inputField.focus();
            triggerMonsterAttack(); // 觸發拋物線石頭攻擊
        }
    }

    function speakWord() {
        if (tasks[activeTab].length === 0) return;
        const utterance = new SpeechSynthesisUtterance(tasks[activeTab][currentIndex[activeTab]].text);
        utterance.lang = 'en-GB'; utterance.rate = activeTab === 'sentence' ? 0.7 : 0.8;
        window.speechSynthesis.speak(utterance);
    }

    function formatPhonicsWord(word) {
        const vowels = ['a', 'e', 'i', 'o', 'u']; let formatted = '';
        for (let char of word) {
            if (vowels.includes(char.toLowerCase())) formatted += `<span class="vowel">${char}</span>`;
            else if (/[a-zA-Z]/.test(char)) formatted += `<span class="consonant">${char}</span>`;
            else formatted += char; 
        }
        return formatted;
    }

    function updateRepeatDots() {
        const dotsContainer = document.getElementById('repeatDots');
        let isWordNeedsDots = activeTab === 'word' && (learningStage.word === 0 || learningStage.word === 1);
        let isSentenceNeedsDots = activeTab === 'sentence' && learningStage.sentence === 0;

        if (isWordNeedsDots || isSentenceNeedsDots) {
            dotsContainer.style.display = "block"; let dots = "";
            let maxDots = 1;
            if (activeTab === 'word' && learningStage.word === 0) maxDots = 3;
            if (activeTab === 'word' && learningStage.word === 1) maxDots = 2;
            if (activeTab === 'sentence' && learningStage.sentence === 0) maxDots = 3;

            for(let i=0; i<maxDots; i++) dots += (i < typingCount[activeTab]) ? "🟩" : "⬜"; 
            dotsContainer.innerText = dots;
        } else { dotsContainer.style.display = "none"; }
    }

    function updateUI() {
        const currentList = tasks[activeTab];
        const cIndex = currentIndex[activeTab];

        if (cIndex >= currentList.length) {
            document.getElementById('progressText').innerText = "✅ 本區所有建築任務已完成！";
            document.getElementById('stageBadge').className = "hidden";
            document.getElementById('hintBox').innerHTML = `🏆 勝利！請點擊上方切換其他挑戰！`;
            document.getElementById('spellInput').classList.add('hidden');
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('repeatDots').classList.add('hidden');
            return;
        }

        const taskArea = document.getElementById('taskArea');
        activeTab === 'sentence' ? taskArea.classList.add('sentence-mode') : taskArea.classList.remove('sentence-mode');
        
        document.getElementById('progressText').innerText = `任務進度：${cIndex + 1} / ${currentList.length}`;
        const badge = document.getElementById('stageBadge');
        const hintBox = document.getElementById('hintBox');

        if(activeTab === 'quiz') {
            const quizTask = currentList[cIndex];
            let modeName = quizTask.mode === 'fill' ? '填空格' : (quizTask.mode === 'scramble' ? '重組字' : '全默寫');
            badge.innerText = `👑 突襲：${modeName}`; badge.className = `stage-badge stage-quiz`;
            hintBox.innerHTML = quizTask.hint.replace(/_/g, '<span class="blank-space">_</span>'); 
        } else {
            const cStage = learningStage[activeTab]; const currentText = currentList[cIndex].text;
            badge.innerText = stageNames[activeTab][cStage]; badge.className = `stage-badge stage-${cStage}`;
            
            if (activeTab === 'word') {
                if (cStage === 0) hintBox.innerHTML = formatPhonicsWord(currentText);
                else if (cStage === 1) hintBox.innerHTML = currentList[cIndex].fillHint.replace(/_/g, '<span class="blank-space">_</span>');
                else if (cStage === 2) hintBox.innerText = scrambleText(currentText, 'word');
                else if (cStage === 3) hintBox.innerText = "❓❓❓"; 
            } else {
                if (cStage === 0) hintBox.innerText = currentText; 
                else if (cStage === 1) hintBox.innerText = scrambleText(currentText, 'sentence');
                else if (cStage === 2) hintBox.innerHTML = generateFirstLetterHint(currentText); 
                else if (cStage === 3) hintBox.innerText = "❓❓❓"; 
            }
        }

        updateRepeatDots(); updateHpUI();
        const inputField = document.getElementById('spellInput');
        inputField.value = ""; inputField.classList.remove('hidden'); inputField.focus();
        document.getElementById('feedbackMessage').innerHTML = ""; document.getElementById('submitBtn').classList.remove('hidden');
        speakWord(); 
    }

    document.getElementById("spellInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") { event.preventDefault(); checkAnswer(); }
    });

    function switchMode(mode) {
        if (mode === 'kid') {
            document.getElementById('parentMode').classList.add('hidden'); document.getElementById('kidMode').classList.remove('hidden');
        } else {
            document.getElementById('parentMode').classList.remove('hidden'); document.getElementById('kidMode').classList.add('hidden');
            window.speechSynthesis.cancel();
        }
    }
</script>
